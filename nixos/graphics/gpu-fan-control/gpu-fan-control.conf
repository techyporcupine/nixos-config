# GPU Fan Control Configuration for AMD Instinct MI50
# Edit paths as needed based on hwmon enumeration

# Temperature sensor path (AMD GPU edge temp, millidegrees)
# Find with: cat /sys/class/hwmon/hwmon*/name | grep -n amdgpu
temp_path = /sys/class/hwmon/hwmon4/temp2_input

# PWM output path (motherboard fan header)
# Find with: cat /sys/class/hwmon/hwmon*/name | grep -n nct
pwm_path = /sys/class/hwmon/hwmon0/pwm3
pwm_enable_path = /sys/class/hwmon/hwmon0/pwm3_enable

# Temperature thresholds (Celsius)
min_temp = 40
max_temp = 100

# PWM bounds (0-255)
# min_pwm: idle speed, max_pwm: full blast
min_pwm = 80
max_pwm = 255

# Polling interval (seconds)
interval = 3
